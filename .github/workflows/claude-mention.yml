name: Claude Mention
on:
  issue_comment:
    types: [created]

jobs:
  claude:
    if: contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      # Crear el directorio slash-commands correctamente
      - name: Crear directorio slash-commands
        run: |
          mkdir -p /home/runner/.claude/slash-commands
          # Crear un archivo básico si es necesario
          echo "[]" > /home/runner/.claude/slash-commands/commands.json 2>/dev/null || true

      - uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

permissions:
  id-token: write
  contents: write
  pull-requests: write