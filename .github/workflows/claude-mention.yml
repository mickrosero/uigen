name: Claude Mention
on:
  issue_comment:
    types: [created]

jobs:
  claude:
    if: contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # Asegura que el directorio slash-commands existe antes de que la acción lo copie
      - name: Crear slash-commands si no existe
        run: |
          mkdir -p /home/runner/work/_actions/anthropics/claude-code-action/beta/slash-commands
          # Puedes agregar archivos requeridos, por ejemplo:
          # echo "[]" > /home/runner/work/_actions/anthropics/claude-code-action/beta/slash-commands/commands.json

      # Verifica y crea la rama remota si no existe
      - name: Verificar y crear rama remota si falta
        env:
          BRANCH_NAME: claude/issue-2-20260305-2007
        run: |
          git fetch origin
          if ! git ls-remote --exit-code --heads origin "$BRANCH_NAME"; then
            git checkout -b "$BRANCH_NAME"
            git push origin "$BRANCH_NAME"
            git checkout main
          fi

      - uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}          

permissions:
  id-token: write
  contents: read